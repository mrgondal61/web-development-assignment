<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>

<style>
    body {
        background: #0f0f0f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .calculator {
        background: #1c1c1c;
        padding: 18px;
        border-radius: 12px;
        width: 280px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    input {
        width: 100%;
        height: 55px;
        font-size: 26px;
        text-align: right;
        margin-bottom: 15px;
        border: none;
        padding-right: 12px;
        border-radius: 8px;
        background: #f5f5f5;
        color: #000;
        font-weight: bold;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        height: 48px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .num { background: #2b2b2b; color: #fff; }
    .op  { background: #ff9800; color: #000; font-weight: bold; }
    .fun { background: #03a9f4; color: #000; }
    .eq  { background: #4caf50; color: #fff; font-size: 18px; }
    .clr { background: #f44336; color: #fff; }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="fun" onclick="func('sin')">sin</button>
        <button class="fun" onclick="func('cos')">cos</button>
        <button class="fun" onclick="func('tan')">tan</button>
        <button class="clr" onclick="clearAll()">C</button>

        <button class="fun" onclick="func('log')">log</button>
        <button class="fun" onclick="func('ln')">ln</button>
        <button class="fun" onclick="func('sqrt')">√</button>
        <button class="op" onclick="append('/')">÷</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">×</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">−</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="fun" onclick="append('Math.PI')">π</button>
        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearAll() {
        display.value = "";
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    function func(type) {
        let v = parseFloat(display.value);
        if (isNaN(v)) return;

        if (type === 'sin') display.value = Math.sin(v * Math.PI / 180);
        if (type === 'cos') display.value = Math.cos(v * Math.PI / 180);
        if (type === 'tan') display.value = Math.tan(v * Math.PI / 180);
        if (type === 'log') display.value = Math.log10(v);
        if (type === 'ln')  display.value = Math.log(v);
        if (type === 'sqrt')display.value = Math.sqrt(v);
    }
</script>

</body>
</html>
